name: Audit Goodplus Blog synchronization

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compare live Blog manifest with GitHub guides
        run: python scripts/sync_goodplus_blog.py audit --skip-source-check
